spring:
  application:
    name: hr-whatsapp-service
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hr_whatsapp_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver

server:
  port: 8084

registry:
  enabled: true
  url: ${REGISTRY_URL:http://localhost:8761}
  service-name: hr-whatsapp-service
  service-url: ${SERVICE_URL:http://localhost:8084}

meta:
  whatsapp-token: ${WHATSAPP_TOKEN:}
  business-account-id: ${WHATSAPP_BUSINESS_ACCOUNT_ID:}

logging:
  level:
    root: INFO
    com.fms.hr_crm: DEBUG

