<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | HR CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --sidebar-bg: #0f172a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Inter, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 24px;
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-logo {
            width: 54px;
            height: 54px;
            background: var(--accent);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 16px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: white;
            margin: 0 0 4px;
            letter-spacing: -0.3px;
        }

        .brand-sub {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 0;
        }

        .card-login {
            background: white;
            border-radius: 20px;
            padding: 36px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.35);
        }

        .card-login h2 {
            font-size: 1.15rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0 0 6px;
        }

        .card-login .subtitle {
            font-size: 0.83rem;
            color: #64748b;
            margin: 0 0 28px;
        }

        .form-label-crm {
            font-size: 0.82rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            display: block;
        }

        .input-group-crm {
            position: relative;
            margin-bottom: 18px;
        }

        .input-icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.85rem;
            pointer-events: none;
        }

        .form-control-crm {
            width: 100%;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            padding: 11px 12px 11px 38px;
            font-size: 0.9rem;
            color: #1e293b;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
            background: #f8fafc;
        }

        .form-control-crm:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
            background: white;
        }

        .btn-login {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 8px;
        }

        .btn-login:hover { background: var(--accent-hover); }
        .btn-login:active { transform: scale(0.98); }

        .alert-login {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #dc2626;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-logout {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.83rem;
            color: #15803d;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-hint {
            text-align: center;
            margin-top: 24px;
            font-size: 0.78rem;
            color: #64748b;
        }

        .divider {
            height: 1px;
            background: #f1f5f9;
            margin: 24px 0;
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <!-- Brand -->
    <div class="brand">
        <div class="brand-logo"><i class="fas fa-users"></i></div>
        <h1 class="brand-title">HR CRM</h1>
        <p class="brand-sub">Recruitment Pipeline Management</p>
    </div>

    <!-- Login card -->
    <div class="card-login">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to access your dashboard</p>

        <!-- Error alert -->
        <div class="alert-login" th:if="${param.error}">
            <i class="fas fa-circle-exclamation"></i>
            Invalid username or password. Please try again.
        </div>

        <!-- Logout success alert -->
        <div class="alert-logout" th:if="${param.logout}">
            <i class="fas fa-circle-check"></i>
            You have been signed out successfully.
        </div>

        <form th:action="@{/login}" method="post">
            <!-- Username -->
            <label class="form-label-crm" for="username">Username</label>
            <div class="input-group-crm">
                <i class="fas fa-user input-icon"></i>
                <input type="text" id="username" name="username"
                       class="form-control-crm"
                       placeholder="admin"
                       autocomplete="username"
                       required>
            </div>

            <!-- Password -->
            <label class="form-label-crm" for="password">Password</label>
            <div class="input-group-crm">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="password" name="password"
                       class="form-control-crm"
                       placeholder="••••••••"
                       autocomplete="current-password"
                       required>
            </div>

            <button type="submit" class="btn-login">
                <i class="fas fa-arrow-right-to-bracket" style="margin-right:8px;"></i>Sign In
            </button>
        </form>

        <div class="divider"></div>
        <div class="footer-hint">
            <i class="fas fa-shield-halved" style="margin-right:5px;color:#94a3b8;"></i>
            Access restricted to authorized personnel only
        </div>
    </div>
</div>

</body>
</html>
