<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Leads — HR CRM Calling</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root { --sidebar-bg:#0f172a; --accent:#6366f1; --accent-hover:#4f46e5; }
    body { background:#f1f5f9; font-family:'Inter',sans-serif; }

    .sidebar {
      position:fixed; top:0; left:0; height:100vh; width:240px;
      background:var(--sidebar-bg); z-index:100; overflow-y:auto;
    }
    .sidebar-brand {
      display:flex; align-items:center; gap:10px;
      padding:20px; border-bottom:1px solid rgba(255,255,255,.08);
    }
    .sidebar-brand .icon { font-size:1.5rem; color:var(--accent); }
    .sidebar-brand .name { color:#fff; font-weight:700; font-size:1.1rem; }
    .sidebar-brand .sub  { color:#94a3b8; font-size:.75rem; display:block; }
    .nav-section { padding:16px 16px 4px; color:#64748b; font-size:.7rem;
                   font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
    .nav-item a {
      display:flex; align-items:center; gap:10px; padding:9px 16px;
      color:#94a3b8; text-decoration:none; border-radius:8px; margin:2px 8px;
      font-size:.875rem; transition:all .15s;
    }
    .nav-item a:hover, .nav-item a.active { background:rgba(99,102,241,.15); color:#fff; }
    .nav-item a .icon { width:18px; text-align:center; }

    .main { margin-left:240px; padding:24px; min-height:100vh; }

    .page-header {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;
    }
    .page-header h1 { font-size:1.5rem; font-weight:700; color:#0f172a; margin:0; }

    .table-card {
      background:#fff; border-radius:14px; border:1px solid #e2e8f0; overflow:hidden;
    }
    .table { margin:0; font-size:.875rem; }
    .table thead th {
      background:#f8fafc; color:#64748b; font-size:.72rem; font-weight:700;
      text-transform:uppercase; letter-spacing:.5px;
      padding:12px 16px; border-bottom:1px solid #e2e8f0; border-top:none;
    }
    .table tbody td { padding:13px 16px; border-color:#f1f5f9; vertical-align:middle; }
    .table tbody tr:hover { background:#fafbff; }
    .table tbody tr:last-child td { border-bottom:none; }

    .status-badge {
      display:inline-block; padding:3px 10px; border-radius:10px;
      font-size:.72rem; font-weight:700;
    }
    .status-NEW          { background:#f0fdf4; color:#15803d; }
    .status-CONTACTED    { background:#eff6ff; color:#1d4ed8; }
    .status-INTERESTED   { background:#fefce8; color:#854d0e; }
    .status-CONVERTED    { background:#f0fdf4; color:#166534; }
    .status-NOT_INTERESTED { background:#fef2f2; color:#991b1b; }
    .status-CLOSED       { background:#f1f5f9; color:#475569; }

    .call-btn {
      background:var(--accent); color:#fff; border:none;
      padding:6px 14px; border-radius:7px; font-size:.8rem;
      font-weight:600; cursor:pointer; transition:background .15s;
      display:inline-flex; align-items:center; gap:6px;
    }
    .call-btn:hover { background:var(--accent-hover); }

    .search-bar {
      background:#fff; border:1px solid #e2e8f0; border-radius:10px;
      padding:10px 16px; display:flex; align-items:center; gap:10px; margin-bottom:20px;
    }
    .search-bar input {
      border:none; outline:none; flex:1; font-size:.9rem; color:#0f172a;
    }
  </style>
</head>
<body>

<!-- ── Sidebar ── -->
<nav class="sidebar">
  <div class="sidebar-brand">
    <i class="fa-solid fa-phone-volume icon"></i>
    <div>
      <div class="name">Call Center</div>
      <span class="sub">HR CRM</span>
    </div>
  </div>

  <div class="nav-section">Navigation</div>
  <ul class="nav-item list-unstyled mb-0">
    <li><a href="/calls/leads" class="active"><i class="fa-solid fa-users icon"></i> Leads</a></li>
    <li><a href="/calls"><i class="fa-solid fa-phone icon"></i> Call Logs</a></li>
  </ul>

  <div class="nav-section mt-3">AI</div>
  <ul class="nav-item list-unstyled mb-0">
    <li><a href="/campaigns"><i class="fa-solid fa-robot icon"></i> AI Campaigns</a></li>
  </ul>
</nav>

<!-- ── Main ── -->
<main class="main">

  <!-- Flash -->
  <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
    <i class="fa-solid fa-circle-check me-2"></i><span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
    <i class="fa-solid fa-triangle-exclamation me-2"></i><span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1><i class="fa-solid fa-users me-2" style="color:var(--accent)"></i>My Leads</h1>
      <p class="text-muted mb-0" style="font-size:.875rem;">
        Leads assigned to you — click <strong>Call</strong> to initiate a masked outbound call.
      </p>
    </div>
    <span style="background:#ede9fe;color:#6d28d9;font-size:.82rem;font-weight:600;
                 padding:6px 14px;border-radius:8px;">
      <i class="fa-solid fa-user-tie me-1"></i>
      <span th:text="${#lists.size(leads)} + ' leads assigned'">0 leads assigned</span>
    </span>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <i class="fa-solid fa-magnifying-glass" style="color:#94a3b8;"></i>
    <input type="text" id="searchInput" placeholder="Search by name or company…"
           oninput="filterTable(this.value)"/>
  </div>

  <!-- Table -->
  <div class="table-card">
    <table class="table" id="leadsTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Company</th>
          <th>Position</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:if="${#lists.isEmpty(leads)}">
          <td colspan="6" class="text-center py-5 text-muted">
            <i class="fa-solid fa-user-slash fa-2x mb-2 d-block" style="color:#cbd5e1;"></i>
            No leads assigned to you yet.
          </td>
        </tr>
        <tr th:each="lead, i : ${leads}">
          <td style="color:#94a3b8;font-size:.8rem;" th:text="${i.index + 1}"></td>
          <td>
            <span class="fw-semibold" th:text="${lead.name()}">Name</span>
            <div style="font-size:.75rem;color:#94a3b8;" th:text="'#' + ${lead.id()}"></div>
          </td>
          <td style="color:#475569;" th:text="${lead.company()} ?: '—'">—</td>
          <td style="color:#475569;font-size:.82rem;" th:text="${lead.positionRequired()} ?: '—'">—</td>
          <td>
            <span class="status-badge"
                  th:classappend="'status-' + ${lead.status()}"
                  th:text="${lead.status()}">NEW</span>
          </td>
          <td>
            <form th:action="@{/calls/initiate}" method="post" style="margin:0;">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="leadId" th:value="${lead.id()}"/>
              <button type="submit" class="call-btn">
                <i class="fa-solid fa-phone-flip"></i> Call
              </button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function filterTable(q) {
    q = q.toLowerCase();
    document.querySelectorAll('#leadsTable tbody tr').forEach(row => {
      const text = row.innerText.toLowerCase();
      row.style.display = text.includes(q) ? '' : 'none';
    });
  }
</script>
</body>
</html>
