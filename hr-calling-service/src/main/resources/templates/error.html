<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Error — HR CRM</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <style>
    body { background: #f1f5f9; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
    .error-card { background: #fff; border-radius: 16px; padding: 40px 48px;
                  border: 1px solid #e2e8f0; text-align: center; max-width: 480px; }
    .error-code { font-size: 4rem; font-weight: 800; color: #6366f1; line-height: 1; }
    .error-title { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin: 12px 0 8px; }
    .error-msg   { color: #64748b; font-size: .9rem; margin-bottom: 24px; }
  </style>
</head>
<body>
  <div class="error-card">
    <div class="error-code" th:text="${status}">500</div>
    <div class="error-title" th:text="${error}">Error</div>
    <div class="error-msg"  th:text="${message != null ? message : 'An unexpected error occurred.'}">Details</div>
    <a href="/calls" class="btn btn-primary"
       style="background:#6366f1;border-color:#6366f1;">
      Back to Call Logs
    </a>
  </div>
</body>
</html>
