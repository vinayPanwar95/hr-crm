<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Change Password — HR CRM Calling</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root { --accent:#6366f1; --accent-hover:#4f46e5; }
    body {
      min-height:100vh; background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      display:flex; align-items:center; justify-content:center;
      font-family:'Inter',sans-serif;
    }
    .card {
      background:#fff; border-radius:18px; padding:40px 36px;
      width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .brand { text-align:center; margin-bottom:20px; }
    .brand .icon-wrap {
      width:56px; height:56px; border-radius:14px;
      background:linear-gradient(135deg,#f59e0b,#fbbf24);
      display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;
    }
    .brand .icon-wrap i { color:#fff; font-size:1.4rem; }
    .brand h1 { font-size:1.3rem; font-weight:700; color:#0f172a; margin:0; }
    .brand p  { color:#64748b; font-size:.875rem; margin:4px 0 0; }
    .otp-banner {
      background:#fef9c3; border:1.5px solid #fde68a; border-radius:10px;
      padding:12px 14px; font-size:.83rem; color:#92400e; margin-bottom:20px;
      display:flex; align-items:flex-start; gap:10px;
    }
    .form-label { font-weight:600; font-size:.85rem; color:#374151; }
    .form-control {
      border-radius:10px; border:1.5px solid #e2e8f0; padding:10px 14px; font-size:.9rem;
    }
    .form-control:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
    .btn-primary-custom {
      width:100%; padding:11px; border-radius:10px;
      background:var(--accent); border:none; color:#fff;
      font-weight:700; font-size:.95rem; transition:background .15s;
    }
    .btn-primary-custom:hover { background:var(--accent-hover); }
    .strength-bar { height:4px; border-radius:4px; transition:all .3s; background:#e2e8f0; margin-top:6px; }
    .strength-hint { font-size:.75rem; color:#64748b; margin-top:3px; }
    .input-icon { position:relative; }
    .input-icon i {
      position:absolute; left:13px; top:50%; transform:translateY(-50%);
      color:#94a3b8; font-size:.9rem;
    }
    .input-icon .form-control { padding-left:38px; }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="icon-wrap"><i class="fa-solid fa-key"></i></div>
    <h1>Change Your Password</h1>
    <p>Welcome, <strong th:text="${username}">recruiter</strong>!</p>
  </div>

  <!-- OTP notice -->
  <div class="otp-banner">
    <i class="fa-solid fa-triangle-exclamation mt-1"></i>
    <div>
      You are using a <strong>temporary password</strong> assigned by your admin.
      You must set a new permanent password before continuing.
    </div>
  </div>

  <!-- Flash error -->
  <div th:if="${error}" class="alert alert-danger py-2 px-3 mb-3" style="border-radius:10px;font-size:.875rem;">
    <i class="fa-solid fa-triangle-exclamation me-2"></i>
    <span th:text="${error}">Error.</span>
  </div>

  <form th:action="@{/auth/change-password}" method="post" onsubmit="return validateForm()">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label for="currentPassword" class="form-label">Temporary Password</label>
      <div class="input-icon">
        <i class="fa-solid fa-lock-open"></i>
        <input type="password" id="currentPassword" name="currentPassword" class="form-control"
               placeholder="Enter the temporary password you received" required autofocus/>
      </div>
    </div>

    <div class="mb-3">
      <label for="newPassword" class="form-label">New Password</label>
      <div class="input-icon">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="newPassword" name="newPassword" class="form-control"
               placeholder="Min. 8 characters" oninput="checkStrength(this.value)" required/>
      </div>
      <div class="strength-bar" id="strengthBar"></div>
      <div class="strength-hint" id="strengthHint"></div>
    </div>

    <div class="mb-4">
      <label for="confirmPassword" class="form-label">Confirm New Password</label>
      <div class="input-icon">
        <i class="fa-solid fa-check-double"></i>
        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
               placeholder="Repeat new password" required/>
      </div>
      <div id="matchHint" style="font-size:.75rem;margin-top:3px;"></div>
    </div>

    <button type="submit" class="btn btn-primary-custom">
      <i class="fa-solid fa-shield-check me-2"></i>Set New Password &amp; Continue
    </button>
  </form>
</div>

<script>
  function checkStrength(val) {
    const bar = document.getElementById('strengthBar');
    const hint = document.getElementById('strengthHint');
    if (!val) { bar.style.width = '0'; hint.textContent = ''; return; }
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    const labels = ['Weak','Fair','Good','Strong'];
    const widths = ['25%','50%','75%','100%'];
    bar.style.width = widths[score - 1] || '25%';
    bar.style.background = colors[score - 1] || '#ef4444';
    hint.textContent = labels[score - 1] || 'Weak';
    hint.style.color = colors[score - 1] || '#ef4444';
  }

  document.getElementById('confirmPassword').addEventListener('input', function () {
    const hint = document.getElementById('matchHint');
    const match = this.value === document.getElementById('newPassword').value;
    hint.textContent = this.value ? (match ? 'Passwords match.' : 'Passwords do not match.') : '';
    hint.style.color = match ? '#22c55e' : '#ef4444';
  });

  function validateForm() {
    const pw  = document.getElementById('newPassword').value;
    const cpw = document.getElementById('confirmPassword').value;
    if (pw !== cpw) {
      document.getElementById('matchHint').textContent = 'Passwords do not match.';
      document.getElementById('matchHint').style.color = '#ef4444';
      return false;
    }
    if (pw.length < 8) { alert('Password must be at least 8 characters.'); return false; }
    return true;
  }
</script>
</body>
</html>
