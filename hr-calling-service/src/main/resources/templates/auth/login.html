<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login — HR CRM Calling</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root { --accent:#6366f1; --accent-hover:#4f46e5; }
    body {
      min-height:100vh; background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      display:flex; align-items:center; justify-content:center;
      font-family:'Inter',sans-serif;
    }
    .card {
      background:#fff; border-radius:18px; padding:40px 36px;
      width:100%; max-width:420px; box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .brand {
      text-align:center; margin-bottom:28px;
    }
    .brand .icon-wrap {
      width:60px; height:60px; border-radius:16px;
      background:linear-gradient(135deg,var(--accent),#818cf8);
      display:inline-flex; align-items:center; justify-content:center;
      margin-bottom:12px;
    }
    .brand .icon-wrap i { color:#fff; font-size:1.5rem; }
    .brand h1 { font-size:1.4rem; font-weight:700; color:#0f172a; margin:0; }
    .brand p  { color:#64748b; font-size:.875rem; margin:4px 0 0; }
    .form-label { font-weight:600; font-size:.85rem; color:#374151; }
    .form-control {
      border-radius:10px; border:1.5px solid #e2e8f0;
      padding:10px 14px; font-size:.9rem;
    }
    .form-control:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
    .btn-login {
      width:100%; padding:11px; border-radius:10px;
      background:var(--accent); border:none; color:#fff;
      font-weight:700; font-size:.95rem; transition:background .15s;
    }
    .btn-login:hover { background:var(--accent-hover); }
    .input-icon { position:relative; }
    .input-icon i {
      position:absolute; left:13px; top:50%; transform:translateY(-50%);
      color:#94a3b8; font-size:.9rem;
    }
    .input-icon .form-control { padding-left:38px; }
    .divider { border-color:#e2e8f0; margin:20px 0; }
    a.forgot-link {
      font-size:.82rem; color:var(--accent); text-decoration:none;
    }
    a.forgot-link:hover { text-decoration:underline; }
  </style>
</head>
<body>

<div class="card">
  <!-- Brand -->
  <div class="brand">
    <div class="icon-wrap"><i class="fa-solid fa-phone-volume"></i></div>
    <h1>Call Center</h1>
    <p>HR CRM — Sign in to your account</p>
  </div>

  <!-- Alerts -->
  <div th:if="${error}" class="alert alert-danger py-2 px-3" style="border-radius:10px;font-size:.875rem;">
    <i class="fa-solid fa-circle-exclamation me-2"></i>
    <span th:text="${error}">Invalid credentials.</span>
  </div>
  <div th:if="${message}" class="alert alert-success py-2 px-3" style="border-radius:10px;font-size:.875rem;">
    <i class="fa-solid fa-circle-check me-2"></i>
    <span th:text="${message}">Success.</span>
  </div>

  <!-- Login form — action handled by Spring Security -->
  <form th:action="@{/login}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <div class="input-icon">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Enter your username" autofocus required/>
      </div>
    </div>

    <div class="mb-1">
      <label for="password" class="form-label">Password</label>
      <div class="input-icon">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Enter your password" required/>
      </div>
    </div>

    <div class="text-end mb-3">
      <a href="/auth/forgot-password" class="forgot-link">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-login">
      <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
    </button>
  </form>
</div>

</body>
</html>
