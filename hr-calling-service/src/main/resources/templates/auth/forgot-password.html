<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Forgot Password — HR CRM Calling</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    :root { --accent:#6366f1; --accent-hover:#4f46e5; }
    body {
      min-height:100vh; background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
      display:flex; align-items:center; justify-content:center;
      font-family:'Inter',sans-serif;
    }
    .card {
      background:#fff; border-radius:18px; padding:40px 36px;
      width:100%; max-width:440px; box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .brand { text-align:center; margin-bottom:24px; }
    .brand .icon-wrap {
      width:56px; height:56px; border-radius:14px;
      background:linear-gradient(135deg,#f59e0b,#fbbf24);
      display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;
    }
    .brand .icon-wrap i { color:#fff; font-size:1.4rem; }
    .brand h1 { font-size:1.3rem; font-weight:700; color:#0f172a; margin:0; }
    .brand p  { color:#64748b; font-size:.875rem; margin:4px 0 0; }
    .form-label { font-weight:600; font-size:.85rem; color:#374151; }
    .form-control {
      border-radius:10px; border:1.5px solid #e2e8f0; padding:10px 14px; font-size:.9rem;
    }
    .form-control:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(99,102,241,.15); }
    .btn-primary-custom {
      width:100%; padding:11px; border-radius:10px;
      background:var(--accent); border:none; color:#fff;
      font-weight:700; font-size:.95rem; transition:background .15s;
    }
    .btn-primary-custom:hover { background:var(--accent-hover); }
    .token-box {
      background:#f0fdf4; border:1.5px solid #bbf7d0; border-radius:10px;
      padding:14px 16px; word-break:break-all; font-family:monospace;
      font-size:.85rem; color:#166534;
    }
    .reset-link {
      display:inline-block; margin-top:8px; color:var(--accent);
      font-size:.82rem; font-weight:600; text-decoration:none;
    }
    .reset-link:hover { text-decoration:underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="brand">
    <div class="icon-wrap"><i class="fa-solid fa-key"></i></div>
    <h1>Forgot Password</h1>
    <p>Enter your email to receive a reset link</p>
  </div>

  <!-- After submission -->
  <div th:if="${submitted}">
    <div th:if="${resetToken}" class="alert alert-success py-2 px-3 mb-3" style="border-radius:10px;font-size:.875rem;">
      <i class="fa-solid fa-circle-check me-2"></i>
      <strong>Reset link generated.</strong>
      In production this would be emailed. For dev, use the link below:
    </div>

    <!-- Dev-mode: show the reset link directly on screen -->
    <div th:if="${resetToken}" class="mb-4">
      <div class="token-box" th:text="${resetToken}"></div>
      <a th:href="@{/auth/reset-password(token=${resetToken})}" class="reset-link">
        <i class="fa-solid fa-arrow-right me-1"></i>Click here to reset your password
      </a>
    </div>

    <div th:unless="${resetToken}" class="alert alert-info py-2 px-3 mb-3" style="border-radius:10px;font-size:.875rem;">
      <i class="fa-solid fa-circle-info me-2"></i>
      If an account with that email exists, a reset link has been sent.
    </div>
  </div>

  <!-- Request form (hidden after submission) -->
  <form th:unless="${submitted}" th:action="@{/auth/forgot-password}" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" id="email" name="email" class="form-control"
             placeholder="you@example.com" autofocus required/>
    </div>

    <button type="submit" class="btn btn-primary-custom">
      <i class="fa-solid fa-paper-plane me-2"></i>Send Reset Link
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="/login" style="font-size:.82rem;color:#64748b;text-decoration:none;">
      <i class="fa-solid fa-arrow-left me-1"></i>Back to login
    </a>
  </div>
</div>

</body>
</html>
